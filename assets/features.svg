<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470">
  <style>
    @keyframes tileGlow1 {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(31,111,235,0.2)); }
      50% { filter: drop-shadow(0 0 6px rgba(31,111,235,0.5)); }
    }
    @keyframes tileGlow2 {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(35,134,54,0.2)); }
      50% { filter: drop-shadow(0 0 6px rgba(35,134,54,0.5)); }
    }
    @keyframes tileGlow3 {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(218,54,51,0.2)); }
      50% { filter: drop-shadow(0 0 6px rgba(218,54,51,0.5)); }
    }
    @keyframes tileGlow4 {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(137,87,229,0.2)); }
      50% { filter: drop-shadow(0 0 6px rgba(137,87,229,0.5)); }
    }
    @keyframes tileGlow5 {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(210,153,34,0.2)); }
      50% { filter: drop-shadow(0 0 6px rgba(210,153,34,0.5)); }
    }
    @keyframes iconPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.25; }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="470" fill="transparent" rx="12"/>

  <!-- ==================== ROW 1 (2 tiles) ==================== -->

  <!-- Tile 1: Task Distribution — box: x=20, y=15, w=420, h=130, center=(230, 80) -->
  <g style="animation: tileGlow1 3s ease-in-out infinite;">
    <rect x="20" y="15" width="420" height="130" rx="12" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
    <circle cx="72" cy="80" r="28" fill="#1f6feb" style="animation: iconPulse 3s ease-in-out infinite;"/>
    <g transform="translate(72, 80)">
      <rect x="-8" y="-8" width="7" height="7" rx="1" fill="#c9d1d9"/>
      <rect x="2" y="-8" width="7" height="7" rx="1" fill="#c9d1d9"/>
      <rect x="-8" y="2" width="7" height="7" rx="1" fill="#c9d1d9"/>
      <rect x="2" y="2" width="7" height="7" rx="1" fill="#c9d1d9"/>
    </g>
    <text x="115" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#c9d1d9" font-weight="600">Task Distribution</text>
    <text x="115" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">Split workloads across unlimited pods</text>
  </g>

  <!-- Tile 2: Proxy Manager — box: x=460, y=15, w=420, h=130 -->
  <g style="animation: tileGlow2 3s ease-in-out infinite; animation-delay: 0.5s;">
    <rect x="460" y="15" width="420" height="130" rx="12" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
    <circle cx="512" cy="80" r="28" fill="#238636" style="animation: iconPulse 3s ease-in-out infinite; animation-delay: 0.5s;"/>
    <g transform="translate(512, 80)">
      <path d="M0,-9 A9,9 0 1,1 -9,0" fill="none" stroke="#c9d1d9" stroke-width="2" stroke-linecap="round"/>
      <path d="M-9,0 L-5,-4 L-5,4 Z" fill="#c9d1d9"/>
      <path d="M0,9 A9,9 0 1,1 9,0" fill="none" stroke="#c9d1d9" stroke-width="2" stroke-linecap="round"/>
      <path d="M9,0 L5,4 L5,-4 Z" fill="#c9d1d9"/>
    </g>
    <text x="555" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#c9d1d9" font-weight="600">Proxy Manager</text>
    <text x="555" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">Automatic rotation and curation of proxies</text>
  </g>

  <!-- ==================== ROW 2 (2 tiles) ==================== -->

  <!-- Tile 3: Anti-Detection — box: x=20, y=165, w=420, h=130 -->
  <g style="animation: tileGlow3 3s ease-in-out infinite; animation-delay: 1s;">
    <rect x="20" y="165" width="420" height="130" rx="12" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
    <circle cx="72" cy="230" r="28" fill="#da3633" style="animation: iconPulse 3s ease-in-out infinite; animation-delay: 1s;"/>
    <g transform="translate(72, 230)">
      <ellipse cx="0" cy="0" rx="9" ry="5" fill="none" stroke="#c9d1d9" stroke-width="2"/>
      <circle cx="0" cy="0" r="2.5" fill="#c9d1d9"/>
      <line x1="-10" y1="8" x2="10" y2="-8" stroke="#c9d1d9" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <text x="115" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#c9d1d9" font-weight="600">Anti-Detection</text>
    <text x="115" y="250" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">Fingerprint spoofing and stealth mode</text>
  </g>

  <!-- Tile 4: Unlimited Scaling — box: x=460, y=165, w=420, h=130 -->
  <g style="animation: tileGlow4 3s ease-in-out infinite; animation-delay: 1.5s;">
    <rect x="460" y="165" width="420" height="130" rx="12" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
    <circle cx="512" cy="230" r="28" fill="#8957e5" style="animation: iconPulse 3s ease-in-out infinite; animation-delay: 1.5s;"/>
    <g transform="translate(512, 230)">
      <path d="M-7,3 L0,-4 L7,3" fill="none" stroke="#c9d1d9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-7,10 L0,3 L7,10" fill="none" stroke="#c9d1d9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="555" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#c9d1d9" font-weight="600">Unlimited Scaling</text>
    <text x="555" y="250" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">Kubernetes-native horizontal scaling</text>
  </g>

  <!-- ==================== ROW 3 (1 tile, centered) ==================== -->

  <!-- Tile 5: Centralized Monitoring — box: x=240, y=315, w=420, h=130 -->
  <g style="animation: tileGlow5 3s ease-in-out infinite; animation-delay: 2s;">
    <rect x="240" y="315" width="420" height="130" rx="12" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
    <circle cx="292" cy="380" r="28" fill="#d29922" style="animation: iconPulse 3s ease-in-out infinite; animation-delay: 2s;"/>
    <g transform="translate(292, 380)">
      <rect x="-9" y="1" width="6" height="8" rx="1" fill="#c9d1d9"/>
      <rect x="-2" y="-7" width="6" height="16" rx="1" fill="#c9d1d9"/>
      <rect x="5" y="-3" width="6" height="12" rx="1" fill="#c9d1d9"/>
    </g>
    <text x="335" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#c9d1d9" font-weight="600">Centralized Monitoring</text>
    <text x="335" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e">Real-time dashboard for all pods</text>
  </g>

</svg>
